<!-- templates/includes/topbar.html -->
<div class="navbar-top d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0 fw-semibold">
            <i class="bi bi-grid-3x3-gap-fill me-2 text-primary"></i>
            {% block page_title %}Visão Geral{% endblock %}
        </h5>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="position-relative">
            <i class="bi bi-bell fs-5 text-secondary"></i>
            <!-- Badge de notificações (exemplo estático) -->
        </div>
        <div class="vr"></div>
        <div class="d-flex align-items-center">
            <img src="https://ui-avatars.com/api/?name={{ request.user.get_full_name|default:request.user.username }}&background=0d6efd&color=fff&size=40&bold=true" class="avatar-sm me-2" alt="avatar">
            <span class="d-none d-md-block">{{ request.user.get_full_name|default:request.user.username }}</span>
        </div>
    </div>
</div>
