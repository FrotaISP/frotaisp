<!-- templates/registration/logged_out.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Logout · FleetISP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
                <h4>Você saiu da sua conta</h4>
                <p class="text-muted">Obrigado por usar o FleetISP.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-box-arrow-in-right"></i> Fazer login novamente
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
