<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 20mm 15mm; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; color: #1a1a1a; }
  h1 { font-size: 18px; color: #01696F; margin: 0 0 4px 0; }
  .subtitle { color: #666; font-size: 10px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  thead tr { background: #01696F; color: #fff; }
  thead th { padding: 7px 8px; text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: .5px; }
  tbody tr:nth-child(even) { background: #f5f5f2; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e0e0e0; }
  .summary { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .card { background: #f0f8f7; border: 1px solid #cedcd8; border-radius: 6px; padding: 10px 16px; min-width: 120px; }
  .card-label { font-size: 8px; color: #01696F; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .card-value { font-size: 16px; font-weight: bold; color: #1a1a1a; }
  .footer { margin-top: 24px; font-size: 8px; color: #999; border-top: 1px solid #e0e0e0; padding-top: 8px; }
  .logo { color: #01696F; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
</style>
</head>
<body>
<div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
  <div>
    {% block header %}{% endblock %}
  </div>
  <div class="logo">🚗 FROTA ISP</div>
</div>
{% block content %}{% endblock %}
<div class="footer">
  Gerado em {{ generated_at|date:"d/m/Y H:i" }} &nbsp;|&nbsp; Período: {{ date_from|date:"d/m/Y" }} a {{ date_to|date:"d/m/Y" }}
</div>
</body>
</html>
