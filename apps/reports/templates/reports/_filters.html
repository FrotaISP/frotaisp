<form method="get" class="row g-2 align-items-end mb-4 p-3 bg-light rounded">
  <div class="col-md-3">
    <label class="form-label small fw-semibold">Data Início</label>
    <input type="date" name="date_from" class="form-control form-control-sm" value="{{ date_from|date:'Y-m-d' }}">
  </div>
  <div class="col-md-3">
    <label class="form-label small fw-semibold">Data Fim</label>
    <input type="date" name="date_to" class="form-control form-control-sm" value="{{ date_to|date:'Y-m-d' }}">
  </div>
  {% block extra_filters %}{% endblock %}
  <div class="col-md-2">
    <button type="submit" class="btn btn-sm btn-primary w-100">Filtrar</button>
  </div>
</form>
