{% extends 'base.html' %}
{% block title %}Excluir OS · FleetISP{% endblock %}
{% block content %}
<div class="card shadow-sm"><div class="card-body"><h2 class="text-danger mb-3"><i class="bi bi-trash me-2"></i>Excluir ordem de servico</h2><p>Tem certeza que deseja excluir a OS <strong>#{{ object.pk }} · {{ object.title }}</strong>?</p><form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Sim, excluir</button> <a href="{% url 'maintenance:work_orders' %}" class="btn btn-secondary">Cancelar</a></form></div></div>
{% endblock %}
