<!-- apps/accounts/templates/accounts/base_auth.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FleetISP{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0b2b5e 0%, #123b7e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            background: transparent;
            padding: 2rem 2rem 1rem;
            text-align: center;
            border-bottom: none;
        }
        .auth-body {
            padding: 1.5rem 2rem 2rem;
        }
        .btn-primary {
            background: #0d6efd;
            border: none;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #0b5ed7;
        }
        .auth-footer {
            text-align: center;
            padding: 1rem 2rem 2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="auth-card card">
        <div class="auth-header">
            <h3 class="fw-bold text-primary">
                <i class="bi bi-truck me-2"></i>FleetISP
            </h3>
            <p class="text-muted">{% block header_text %}Acesse sua conta{% endblock %}</p>
        </div>
        <div class="auth-body">
            {% block content %}{% endblock %}
        </div>
        <div class="auth-footer">
            {% block footer %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
