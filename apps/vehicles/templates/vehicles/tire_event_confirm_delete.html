{% extends 'base.html' %}
{% block title %}Excluir evento · FleetISP{% endblock %}
{% block content %}
<div class="card shadow-sm"><div class="card-body"><h2 class="text-danger mb-3"><i class="bi bi-trash me-2"></i>Excluir evento</h2><p>Tem certeza que deseja excluir o evento <strong>{{ object.get_event_type_display }}</strong> do pneu <strong>{{ object.tire.code }}</strong>?</p><form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Sim, excluir</button> <a href="{% url 'vehicles:tire_events' %}" class="btn btn-secondary">Cancelar</a></form></div></div>
{% endblock %}
