# docker/nginx/default.conf
upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Redireciona para HTTPS em produção (opcional)
    # if ($http_x_forwarded_proto = "http") {
    #     return 301 https://$host$request_uri;
    # }

    # Tamanho máximo de upload (útil para imagens/PDFs)
    client_max_body_size 20M;

    # Arquivos estáticos (CSS, JS, imagens do projeto)
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Arquivos de mídia (uploads dos usuários)
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy para o Django (Gunicorn)
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Configuração opcional para arquivos grandes e timeouts
    proxy_read_timeout 120;
    proxy_connect_timeout 120;
}