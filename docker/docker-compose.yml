# docker/docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fleetisp_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-frota_db}
      POSTGRES_USER: ${DB_USER:-frota_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-frota_user} -d ${DB_NAME:-frota_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fleetisp_web
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=${DB_NAME:-frota_db}
      - DB_USER=${DB_USER:-frota_user}
      - DB_PASSWORD=${DB_PASSWORD:-senha_segura}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: fleetisp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"  # opcional, se usar HTTPS
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: